<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-on: #00e676;
            --accent-on-glow: rgba(0, 230, 118, 0.4);
            --accent-off: #ff5252;
            --border-radius: 12px;
        }

        body {
            width: 260px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .header img {
            width: 24px;
            height: 24px;
            filter: invert(1);
        }

        h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .info-box {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--accent-on);
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
            text-align: left;
            line-height: 1.4;
        }

        .resource-box {
            text-align: left;
            margin-bottom: 15px;
            padding: 10px;
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }

        .res-title {
            font-size: 12px;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .res-val {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .res-bar-bg {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .res-bar-fill {
            height: 100%;
            background: var(--accent-on);
            width: 0%;
            transition: width 0.5s ease;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 10px var(--accent-on-glow);
            }

            50% {
                box-shadow: 0 0 20px var(--accent-on), 0 0 30px var(--accent-on-glow);
            }

            100% {
                box-shadow: 0 0 10px var(--accent-on-glow);
            }
        }

        button.on {
            background-color: var(--accent-on);
            color: #000;
            animation: pulse 2s infinite;
        }

        button.off {
            background-color: transparent;
            color: var(--accent-off);
            border: 1px solid var(--accent-off);
        }

        button.off:hover {
            background-color: rgba(255, 82, 82, 0.1);
        }

        .status-log {
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-muted);
            background: #141414;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2a2a;
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }

        .footer {
            margin-top: 16px;
            font-size: 10px;
            color: #666;
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #888;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="icons/icons8-infinity-48.png" alt="Infinity Logo" id="logoIcon">
            <h2>ColabGO</h2>
        </div>
        <div class="subtitle">Ghost Operator</div>

        <div class="info-box">
            ⚡ <b>Keep your computer awake</b> and leave the Google Colab tab open in the background. ColabGO will handle
            the rest!
        </div>

        <div class="resource-box">
            <div class="res-title">System RAM</div>
            <div class="res-val" id="ramText">Fetching...</div>
            <div class="res-bar-bg">
                <div class="res-bar-fill" id="ramBar"></div>
            </div>

            <div class="res-title">Disk</div>
            <div class="res-val" id="diskText">Fetching...</div>
            <div class="res-bar-bg" id="diskBarBg" style="margin-bottom:0;">
                <div class="res-bar-fill" id="diskBar"></div>
            </div>

            <!-- DYNAMIC GPU SECTION -->
            <div id="gpuContainer" style="display: none;">
                <div class="res-title" style="margin-top: 10px;">GPU RAM</div>
                <div class="res-val" id="gpuText">Fetching...</div>
                <div class="res-bar-bg" style="margin-bottom:0;">
                    <div class="res-bar-fill" id="gpuBar"></div>
                </div>
            </div>
        </div>

        <button id="mainToggle" class="off">INACTIVE</button>

        <div class="status-log" id="logBox">
            Waiting for activation...
        </div>

        <div class="footer">
            Developed by <span>GamikaKJ</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
